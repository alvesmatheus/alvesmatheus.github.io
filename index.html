<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Matheus Alves</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/3.7.2/animate.min.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <script src="https://kit.fontawesome.com/7075b60a42.js" crossorigin="anonymous" ></script>
  </head>
  <body>
    <section id="intro" class="grid default-grid-template default-section">
      <div class="default-wrapper">
        <img src="assets/img/profile.jpg" id="profile-img" class="round-cropper animated fadeIn" />
        <h1 class="animated fadeIn">
          I'm <span class="color-highlight">Matheus Alves</span>!
        </h1>
        <div class="intro-greeting animated fadeIn delay-1s">
          It's a pleasure to meet ya! What do you wanna know about me?
        </div>
        <div class="social-media-wrapper animated fadeIn delay-2s">
          <a href="https://github.com/alvesmatheus">
            <img src="./assets/img/github-icon.png" class="social-media-icon" title="GitHub" />
          </a>
          <a href="linkedin.com/in/alves-matheus">
            <img src="./assets/img/linkedin-icon.png" class="social-media-icon" title="LinkedIn" />
          </a>
          <a href="https://twitter.com/mathsalvs">
            <img src="./assets/img/twitter-icon.png" class="social-media-icon" title="Twitter" />
          </a>
          <a href="mailto:matheus.santos@ccc.ufcg.edu.br">
            <img src="./assets/img/mail-icon.png" class="social-media-icon" title="E-mail" />
          </a>
        </div>
      </div>
      <a href="#about" class="grid default-scroll-btn" title="About">
        <span class="fas fa-chevron-down animated pulse infinite next-session-icon"></span>
      </a>
    </section>
    <section id="about" class="grid default-grid-template default-section">
      <div class="default-wrapper">
        <h2>About</h2>
        <p class="default-text">
          So, got interested?
        </p>
      </div>
      <a href="#experience" class="grid default-scroll-btn" title="Experience">
        <span class="fas fa-chevron-down animated pulse infinite next-session-icon"></span>
      </a>
    </section>
    <script src="./js/app.js"></script>
  </body>
</html>
